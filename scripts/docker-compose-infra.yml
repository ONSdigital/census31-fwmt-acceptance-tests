name: census31-fwmt-acceptance-tests

services:
  postgres:
    image: postgres:9.6
    command: ["-c", "shared_buffers=256MB", "-c", "max_connections=500"]
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${FWMT_POSTGRES_PASSWORD:-postgres}"
    ports:
      - "${FWMT_POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - fwmt_acceptance_postgres:/var/lib/postgresql/data

  rabbit-rm:
    image: rabbitmq:3.6.10-management
    ports:
      - "${FWMT_RM_RABBIT_PORT:-5674}:5672"
      - "${FWMT_RM_RABBIT_MANAGEMENT_PORT:-15674}:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbit-gw:
    image: rabbitmq:3.6.10-management
    ports:
      - "${FWMT_GW_RABBIT_PORT:-5673}:5672"
      - "${FWMT_GW_RABBIT_MANAGEMENT_PORT:-15673}:15672"
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 10

  pubsub:
    # Requires Java (not present in cloud-sdk:slim). Official emulators image bundles JRE + Pub/Sub fake.
    image: gcr.io/google.com/cloudsdktool/google-cloud-cli:emulators
    command:
      - gcloud
      - beta
      - emulators
      - pubsub
      - start
      - --host-port=0.0.0.0:8085
    ports:
      - "${FWMT_PUBSUB_EMULATOR_PORT:-8085}:8085"

  redis:
    image: redis:4.0
    ports:
      - "${FWMT_REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    volumes:
      - fwmt_acceptance_redis:/data

volumes:
  fwmt_acceptance_postgres:
  fwmt_acceptance_redis:
